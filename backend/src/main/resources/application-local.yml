spring:

  datasource:
    url: jdbc:postgresql://localhost:5432/personal_finance
    username: postgres
    password: postgres

  flyway:
    enabled: true

  jpa:
    open-in-view: false

    hibernate:
      ddl-auto: validate

    properties:
      hibernate:
        format_sql: true

logging:
  level:
    org.hibernate.SQL: debug